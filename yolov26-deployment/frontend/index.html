<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLOv26 目标检测演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
            margin-bottom: 30px;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        
        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        .upload-text {
            font-size: 1.2em;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .upload-hint {
            color: #999;
            font-size: 0.9em;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .control-group {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }
        
        .control-group select,
        .control-group input[type="range"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
        }
        
        .control-group input[type="range"] {
            padding: 0;
        }
        
        .range-value {
            display: inline-block;
            margin-left: 10px;
            font-weight: bold;
            color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        button {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .results {
            display: none;
        }
        
        .results.show {
            display: block;
        }
        
        .image-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .image-box {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .image-box h3 {
            background: #f8f9ff;
            padding: 15px;
            margin: 0;
            color: #667eea;
        }
        
        .image-box img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .detection-list {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
        }
        
        .detection-list h3 {
            margin-bottom: 15px;
            color: #667eea;
        }
        
        .detection-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        
        .detection-item:last-child {
            margin-bottom: 0;
        }
        
        .detection-class {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .detection-info {
            display: flex;
            gap: 20px;
            font-size: 0.9em;
            color: #666;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            display: none;
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .error.show {
            display: block;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 YOLOv26 目标检测</h1>
            <p>基于 Ultralytics YOLOv26 的实时目标检测演示系统</p>
        </div>
        
        <div class="content">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📷</div>
                <div class="upload-text">点击或拖拽上传图片</div>
                <div class="upload-hint">支持 JPG、PNG 格式，最大 10MB</div>
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <label>选择模型</label>
                    <select id="modelSelect">
                        <option value="yolo26n.pt">YOLOv26-Nano (最快)</option>
                        <option value="yolo26s.pt">YOLOv26-Small</option>
                        <option value="yolo26m.pt">YOLOv26-Medium</option>
                        <option value="yolo26l.pt">YOLOv26-Large (最准)</option>
                        <option value="yolo26x.pt">YOLOv26-XLarge (超准)</option>
                    </select>
                </div>
                
                <div class="control-group">
                    <label>置信度阈值 <span class="range-value" id="confValue">0.25</span></label>
                    <input type="range" id="confSlider" min="0.1" max="0.9" step="0.05" value="0.25">
                </div>
                
                <div class="control-group">
                    <label>IoU 阈值 <span class="range-value" id="iouValue">0.7</span></label>
                    <input type="range" id="iouSlider" min="0.3" max="0.9" step="0.05" value="0.7">
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn-primary" id="detectBtn" disabled>开始检测</button>
                <button class="btn-secondary" id="resetBtn">重置</button>
            </div>
            
            <div class="error" id="errorMsg"></div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在检测中，请稍候...</p>
            </div>
            
            <div class="results" id="results">
                <div class="stats" id="stats"></div>
                
                <div class="image-comparison">
                    <div class="image-box">
                        <h3>原始图片</h3>
                        <img id="originalImage" alt="原始图片">
                    </div>
                    <div class="image-box">
                        <h3>检测结果</h3>
                        <img id="resultImage" alt="检测结果">
                    </div>
                </div>
                
                <div class="detection-list">
                    <h3>检测详情</h3>
                    <div id="detectionList"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
